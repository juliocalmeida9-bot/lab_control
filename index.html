<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Sala</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        form { display: flex; flex-direction: column; width: 300px; gap: 10px; }
    </style>
</head>
<body>
    <h2>Cadastrar Nova Sala</h2>
    <!-- O action aponta para o arquivo PHP que processará os dados -->
    <form action="config.php" method="POST">
        <input type="text" name="nome" placeholder="Nome da Sala (ex: Lab 01)" required>
        <input type="text" name="bloco" placeholder="Bloco">
        <input type="number" name="capacidade" placeholder="Capacidade">
        <textarea name="descricao" placeholder="Descrição"></textarea>
        <button type="submit">Salvar no Banco</button>
    </form>
</body>
</html>
